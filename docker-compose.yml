version: "3.9"

services:
  plant-disease-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: plant-disease-predictor:latest
    container_name: plant_disease_app
    ports:
      - "8501:8501"          # Streamlit default port
    volumes:
      # Mount model files externally so you can swap models without rebuilding
      - ./plant_disease_prediction_model.h5:/app/plant_disease_prediction_model.h5:ro
      - ./class_indices.json:/app/class_indices.json:ro
    environment:
      - TF_CPP_MIN_LOG_LEVEL=3
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
